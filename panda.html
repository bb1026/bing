<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <title>Panda Remit 实时汇率</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow-x: hidden;
    }

    .container {
      max-width: 650px;
      margin: 0 auto;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .top-rates {
      text-align: center;
      margin-top: 10px;
      line-height: 2;
      font-size: 16px;
      color: #2c3e50;
    }

    .top-rate-item {
      padding: 4px 0;
    }

    .top-rate-item b {
      color: #007BFF;
    }

    .calculator {
      margin-top: 20px;
      text-align: center;
    }

    input[type="number"],
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 160px;
      height: 38px;
      margin: 10px 5px;
      box-sizing: border-box;
      font-size: 16px;
    }

    select {
      appearance: none;
      background-color: white;
      text-align: center;
    }

    .exchange-rate {
      margin-top: 20px;
      text-align: center;
      padding: 12px;
      background: #f8f9fa;
      border-radius: 10px;
    }

    .source {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: #666;
    }

    .swap-btn {
      padding: 8px 15px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background: #007bff;
      color: white;
      border-radius: 6px;
      margin: 10px;
      transition: all 0.3s;
    }

    .swap-btn:hover {
      background: #0056b3;
      transform: scale(1.05);
    }

    .panda-container {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 20px auto;
    }

    .panda-logo {
      display: block;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
      object-fit: cover;
    }

    .mini-panda {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background-image: url('https://bing.0515364.xyz/imgs/Panda_Remit.JPG');
      background-size: cover;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      position: absolute;
      z-index: 9999;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* ===== 汇率更新闪烁 ===== */
    .flash-update {
      animation: flashBg 0.8s ease;
    }

    @keyframes flashBg {
      0% { background: #f8f9fa; }
      30% { background: #d1ecf1; }
      100% { background: #f8f9fa; }
    }

    /* ===== Toast提示 ===== */
    .rate-toast {
      position: fixed;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #28a745;
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      z-index: 99999;
    }

    .rate-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(10px);
    }

    @media (max-width: 600px) {
      input[type="number"],
      select {
        width: 140px;
      }

      .container {
        padding: 18px;
      }
    }
  </style>
</head>

<body>

<div id="rateToast" class="rate-toast">汇率已更新</div>

<div class="container">

  <div class="panda-container">
    <img src="https://bing.0515364.xyz/imgs/Panda_Remit.JPG"
         class="panda-logo"
         id="pandaLogo"/>
  </div>

  <h1>Panda Remit</h1>

  <div class="top-rates" id="topRates">热门汇率加载中...</div>

  <div class="exchange-rate" id="exchangeRate">
    <p>加载中...</p>
  </div>

  <div class="calculator">

    <input type="number" id="num1" value="100"
           oninput="updateResult('num1','num2','multiply')"
           onblur="removeLeadingZero('num1')" />

    <select id="fromCurrency"></select>

    <br/>

    <input type="number" id="num2"
           oninput="updateResult('num2','num1','divide')"
           onblur="removeLeadingZero('num2')" />

    <select id="toCurrency"></select>

    <br/>

    <button class="swap-btn" onclick="swapCurrencies()">
      ↑ ↓ 切换货币
    </button>

  </div>

  <div class="source">
    数据来源
    <a href="https://www.pandaremit.com/zh" target="_blank">
      熊猫汇款(Panda Remit)
    </a>
  </div>

</div>

<script>

const currencyOptions = [
  { value: "CNY", text: "CNY 中国" },
  { value: "SGD", text: "SGD 新加坡" },
  { value: "MYR", text: "MYR 马来西亚" },
  { value: "HKD", text: "HKD 香港" },
  { value: "USD", text: "USD 美国" },
  { value: "JPY", text: "JPY 日本" },
  { value: "THB", text: "THB 泰国" },
  { value: "KRW", text: "KRW 韩国" },
  { value: "EUR", text: "EUR 欧洲" },
  { value: "GBP", text: "GBP 英国" },
  { value: "AUD", text: "AUD 澳大利亚" },
  { value: "CAD", text: "CAD 加拿大" },
  { value: "VND", text: "VND 越南" }
];

const topRatePairs = [
  ["SGD", "CNY"],
  ["SGD", "MYR"],
  ["SGD", "THB"]
];

let lastRateMap = {};

function initCurrencySelect(id) {
  const select = document.getElementById(id);
  currencyOptions.forEach(o => {
    const opt = document.createElement("option");
    opt.value = o.value;
    opt.textContent = o.text;
    select.appendChild(opt);
  });
}

document.addEventListener("DOMContentLoaded", () => {

  initCurrencySelect("fromCurrency");
  initCurrencySelect("toCurrency");

  fromCurrency.value = "SGD";
  toCurrency.value = "CNY";

  fetchExchangeRate(false);
  loadTopRates();

  fromCurrency.onchange = () => fetchExchangeRate();
  toCurrency.onchange = () => fetchExchangeRate();

  startRotation();

  setInterval(() => {
    fetchExchangeRate(true);
  }, 15000);
});

async function loadTopRates() {
  const box = document.getElementById("topRates");
  let html = "";

  for (const [f, t] of topRatePairs) {
    try {
      const res = await fetch(`https://prod.pandaremit.com/pricing/rate/${f}/${t}`);
      const data = await res.json();
      const rate = parseFloat(data.model.pandaRate).toFixed(4);

      html += `<div>1 ${f} = <b>${rate}</b> ${t}</div>`;
    } catch {}
  }

  box.innerHTML = html;
}

function fetchExchangeRate() {

  const from = fromCurrency.value;
  const to = toCurrency.value;

  fetch(`https://prod.pandaremit.com/pricing/rate/${from}/${to}`)
    .then(r => r.json())
    .then(data => {

      const rate = parseFloat(data.model.pandaRate).toFixed(4);
      const key = `${from}-${to}`;

      const old = lastRateMap[key];

      exchangeRate.innerHTML = `
        <p style="font-size:22px;font-weight:bold;">
          1 ${from} = <span id="exchangeRateValue">${rate}</span> ${to}
        </p>`;

      updateResult('num1','num2','multiply');

      if (old && old !== rate) {
        showToast();
        flashBox();
      }

      lastRateMap[key] = rate;

    });
}

function showToast() {
  const t = document.getElementById("rateToast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1500);
}

function flashBox() {
  const box = document.getElementById("exchangeRate");
  box.classList.add("flash-update");
  setTimeout(() => box.classList.remove("flash-update"), 800);
}

function updateResult(i,o,type){
  const a = parseFloat(document.getElementById(i).value)||0;
  const r = parseFloat(exchangeRateValue?.innerText);
  if(!r) return;
  document.getElementById(o).value =
    type==="multiply"? (a*r).toFixed(2):(a/r).toFixed(2);
}

function removeLeadingZero(id){
  const el=document.getElementById(id);
  el.value=el.value.replace(/^0+(?=\d)/,'')||"0";
}

function swapCurrencies(){
  [fromCurrency.value,toCurrency.value]=[toCurrency.value,fromCurrency.value];
  fetchExchangeRate();
}

/* ===== 点击小熊猫 ===== */
document.addEventListener("click",e=>{
  if(e.target.closest("input,select,button,a"))return;

  const d=document.createElement("div");
  d.className="mini-panda";
  d.style.left=e.clientX-20+"px";
  d.style.top=e.clientY-20+"px";
  document.body.appendChild(d);

  setTimeout(()=>d.remove(),2500);
});

/* ===== 旋转 ===== */
let angle=0;
function startRotation(){
  setInterval(()=>{
    angle=(angle+0.5)%360;
    pandaLogo.style.transform=`rotate(${angle}deg)`;
  },16);
}

</script>

</body>
</html>
